<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writtenwhisperscrotchets</title>
  </head>
  <body>
    <header class="navbar">
      <h1 class="logo">The Written Whispers Crotchets</h1>
      <nav class="nav-links">
        <a href="Home">Home |</a>
        <a href="Shop">Shop |</a>
        <a href="About">About |</a>
        <a href="Contact">Contact</a>
      </nav>
    </header>
    <style>
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background-color: lavenderblush;
        border-bottom: 1px solid;
      }
      .logo {
        font-family: "Great Vibes", cursive;
        font-size: 28px;
        margin: 0;
      }
      .nav-links a {
        margin-left: 25px;
        text-decoration: none;
        color: #333;
        font-size: 16px
        transition: 0.35em;
      }
      .nav-links a:hover {
        color:#ff7a00;
        }
    </style>

    <blockquote class="blockquote">
      "Every stitch tells a story, crafted with love and care"
    </blockquote>
    <style>
      .blockquote {
        text-align: center;
        font-size: 2px;
        font-style: italic;
        margin: 50px auto;
        max-width: 600px;
        color: #333;
        border-left: 4px solid #ff7a00;
        padding-left: 15px;
      }
    </style>
    <section class="hero">Handmade with love🪡❤️</section>
    <style>
      .hero {
        height: 400px;
        background: linear-gradient(
            rgba(0, 0, 0, 0, 0.4),
            rgba(0, 0, 0, 0, 0.4)
          )
          url(Image.jpeg);
        background-size: cover;
        background-position: center;

        display: flex;
        justify-content: center;
        align-items: center;

        color: white;
      }
    </style>
  </body>
</html>
